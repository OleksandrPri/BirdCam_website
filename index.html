<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>birdcam</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div id="login-page">
  <div class="login-left">
    <div class="login-logo-placeholder">🐦</div>
    <div class="login-brand">birdcam</div>
  </div>
  <div class="login-right">
    <div class="login-title">login</div>
    <div class="login-form">
      <input class="login-input" id="username" type="text" placeholder="username" autocomplete="username"/>
      <input class="login-input" id="password" type="password" placeholder="password" autocomplete="current-password"/>
      <span class="login-error" id="login-error">Invalid username or password</span>
      <button class="login-btn" id="login-btn" title="Login">→</button>
    </div>
  </div>
</div>

<div id="dashboard-page">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">🐦</div>
      birdcam
    </div>
    <button class="logout-btn" id="logout-btn">logout</button>
  </div>

  <div class="dashboard-content">
    <div class="device-row">
      <div class="device-select-wrap">
        <select class="device-select" id="device-select"></select>
      </div>
      <div class="device-meta" id="device-meta">loading…</div>
    </div>

    <div class="chart-card">
      <div class="chart-axis-label">°C</div>
      <div class="chart-wrap" id="chart-wrap">
        <div class="chart-loading" id="chart-loading"><div class="spinner"></div> Loading data…</div>
        <svg id="chart-svg" style="display:none;" height="260"></svg>
      </div>
      <div class="chart-tooltip" id="chart-tooltip"></div>
    </div>

    <div>
      <div class="section-header">
        <div class="section-title">
          Media
          <span class="badge" id="media-count">—</span>
        </div>
        <div class="media-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="image">Photos</button>
          <button class="filter-btn" data-filter="video">Videos</button>
          <button class="csv-btn" id="csv-btn" title="Download CSV">⬇ CSV</button>
        </div>
      </div>
      <div class="media-grid" id="media-grid">
        <div class="media-empty">Loading…</div>
      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="" style="display:none"/>
    <video id="lightbox-video" controls style="display:none"></video>
    <div class="lightbox-meta" id="lightbox-meta"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/chart.js"></script>
<script src="js/media.js"></script>
<script src="js/app.js"></script>
</body>
</html>
