<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>birdcam</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #1a1640;
    --panel: #211e52;
    --card: #2a2760;
    --border: #3d3a7a;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e8e6ff;
    --muted: #8883bb;
    --danger: #ff6584;
    --green: #4ade80;
    --chart-line: #a78bfa;
    --chart-dot: #6c63ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOGIN PAGE ── */
  #login-page {
    display: flex;
    min-height: 100vh;
  }

  .login-left {
    flex: 1;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }

  .login-left::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .login-logo {
    width: 140px;
    height: 140px;
    position: relative;
    z-index: 1;
  }

  .login-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(167,139,250,0.4));
  }

  .login-logo-placeholder {
    width: 140px; height: 140px;
    background: var(--card);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px;
    position: relative; z-index: 1;
    box-shadow: 0 0 40px rgba(108,99,255,0.3);
  }

  .login-brand {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    position: relative; z-index: 1;
  }

  .login-right {
    flex: 0 0 420px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 48px;
    gap: 0;
  }

  .login-title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 40px;
    align-self: flex-start;
    color: var(--text);
  }

  .login-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .login-input {
    width: 100%;
    padding: 14px 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .login-input::placeholder { color: var(--muted); }

  .login-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }

  .login-btn {
    align-self: flex-end;
    width: 52px; height: 52px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .login-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.05);
  }

  .login-error {
    color: var(--danger);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    display: none;
  }

  .login-error.show { display: block; }

  /* ── DASHBOARD PAGE ── */
  #dashboard-page {
    display: none;
    min-height: 100vh;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 100;
  }

  .topbar-brand {
    display: flex; align-items: center; gap: 12px;
    font-size: 20px; font-weight: 800;
    letter-spacing: -0.3px;
  }

  .topbar-brand-icon {
    width: 36px; height: 36px;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
  }

  .logout-btn {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

  .dashboard-content {
    padding: 32px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── DEVICE SELECTOR ── */
  .device-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .device-select-wrap {
    position: relative;
  }

  .device-select {
    appearance: none;
    padding: 10px 40px 10px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    min-width: 160px;
    transition: border-color 0.2s;
  }

  .device-select:focus { border-color: var(--accent); }

  .device-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 12px;
  }

  .device-meta {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .device-meta span { color: var(--text); }

  /* ── CHART CARD ── */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    position: relative;
  }

  .chart-axis-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .chart-wrap {
    position: relative;
    overflow: visible;
  }

  #chart-svg {
    width: 100%;
    display: block;
    overflow: visible;
  }

  .chart-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 260px;
    gap: 8px;
    color: var(--muted);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── MEDIA GRID ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }

  .section-title .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    background: var(--border);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .media-filters {
    display: flex; gap: 8px;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .media-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  }

  .media-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    border-color: var(--accent);
  }

  .media-thumb {
    width: 100%; height: 160px;
    object-fit: cover;
    display: block;
    background: var(--panel);
  }

  .media-thumb-video {
    width: 100%; height: 160px;
    object-fit: cover;
    display: block;
    background: var(--panel);
    position: relative;
  }

  .media-thumb-placeholder {
    width: 100%; height: 160px;
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: var(--muted);
  }

  .media-video-wrap {
    position: relative;
    height: 160px;
  }

  .media-video-wrap video {
    width: 100%; height: 160px;
    object-fit: cover;
  }

  .play-icon {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3);
    font-size: 32px;
    color: white;
    pointer-events: none;
  }

  .media-info {
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 4px;
  }

  .media-info-row {
    display: flex; justify-content: space-between; align-items: center;
  }

  .media-temp {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent2);
  }

  .media-type-badge {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(108,99,255,0.2);
    color: var(--accent2);
  }

  .media-type-badge.video {
    background: rgba(74,222,128,0.15);
    color: var(--green);
  }

  .media-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .media-empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
  }

  .lightbox.show { display: flex; }

  .lightbox-inner {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    max-width: 90vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .lightbox-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.5);
    border: none; border-radius: 50%;
    color: white; font-size: 16px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    z-index: 10;
    transition: background 0.2s;
  }

  .lightbox-close:hover { background: var(--danger); }

  #lightbox-img {
    max-width: 80vw;
    max-height: 70vh;
    object-fit: contain;
    display: block;
  }

  #lightbox-video {
    max-width: 80vw;
    max-height: 70vh;
    display: block;
  }

  .lightbox-meta {
    padding: 16px 20px;
    display: flex; gap: 24px; align-items: center;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .lightbox-meta strong { color: var(--text); }

  /* tooltip on chart */
  .chart-tooltip {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0;
    pointer-events: none;
    display: none;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    z-index: 50;
    min-width: 160px;
  }

  .chart-tooltip img, .chart-tooltip video {
    width: 160px; height: 100px;
    object-fit: cover;
    display: block;
  }

  .chart-tooltip-info {
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .chart-tooltip-info strong { color: var(--text); display: block; font-size: 13px; margin-bottom: 2px; }
</style>
</head>
<body>

<!-- ══════════════════════ LOGIN ══════════════════════ -->
<div id="login-page">
  <div class="login-left">
    <div class="login-logo-placeholder">🐦</div>
    <div class="login-brand">birdcam</div>
  </div>
  <div class="login-right">
    <div class="login-title">login</div>
    <div class="login-form">
      <input class="login-input" id="username" type="text" placeholder="username" autocomplete="username"/>
      <input class="login-input" id="password" type="password" placeholder="password" autocomplete="current-password"/>
      <span class="login-error" id="login-error">Invalid username or password</span>
      <button class="login-btn" id="login-btn" title="Login">→</button>
    </div>
  </div>
</div>

<!-- ══════════════════════ DASHBOARD ══════════════════════ -->
<div id="dashboard-page">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">🐦</div>
      birdcam
    </div>
    <button class="logout-btn" id="logout-btn">logout</button>
  </div>

  <div class="dashboard-content">

    <!-- Device selector + meta -->
    <div class="device-row">
      <div class="device-select-wrap">
        <select class="device-select" id="device-select"></select>
      </div>
      <div class="device-meta" id="device-meta">loading…</div>
    </div>

    <!-- Temperature chart -->
    <div class="chart-card">
      <div class="chart-axis-label">°C</div>
      <div class="chart-wrap" id="chart-wrap">
        <div class="chart-loading" id="chart-loading"><div class="spinner"></div> Loading data…</div>
        <svg id="chart-svg" style="display:none;" height="260"></svg>
      </div>
      <div class="chart-tooltip" id="chart-tooltip"></div>
    </div>

    <!-- Media grid -->
    <div>
      <div class="section-header">
        <div class="section-title">
          Media
          <span class="badge" id="media-count">—</span>
        </div>
        <div class="media-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="image">Photos</button>
          <button class="filter-btn" data-filter="video">Videos</button>
        </div>
      </div>
      <div class="media-grid" id="media-grid">
        <div class="media-empty">Loading…</div>
      </div>
    </div>

  </div>
</div>

<!-- ══════════════════════ LIGHTBOX ══════════════════════ -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lightbox-close" id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="" style="display:none"/>
    <video id="lightbox-video" controls style="display:none"></video>
    <div class="lightbox-meta" id="lightbox-meta"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const API_BASE = 'https://ktor-env.politecliff-5fb4f1a7.polandcentral.azurecontainerapps.io'; // same origin; or set to 'https://your-backend.com'

// ── STATE ───────────────────────────────────────────────
let token = localStorage.getItem('jwt_token');
let allRecords = [];
let activeFilter = 'all';

// ── HELPERS ─────────────────────────────────────────────
function showLoginPage() {
  document.getElementById('dashboard-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
}

async function showDashboardPage() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('dashboard-page').style.display = 'flex';
  await loadDevices();
}

async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };

  if (token) {
    headers['Authorization'] = `Bearer ${token}`;
  }

  const res = await fetch(API_BASE + path, { ...opts, headers });

  if (res.status === 401) {
    token = null;
    localStorage.removeItem('jwt_token');
    showLoginPage();
  }

  return res;
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

function tempColor(t) {
  if (t < 0) return '#60a5fa';
  if (t < 10) return '#a78bfa';
  if (t < 20) return '#4ade80';
  return '#f97316';
}

// ── LOGIN ────────────────────────────────────────────────
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('password').addEventListener('keydown', e => e.key === 'Enter' && doLogin());
document.getElementById('username').addEventListener('keydown', e => e.key === 'Enter' && doLogin());

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');

  try {
    const res = await apiFetch('/login', {
      method: 'POST',
      body: JSON.stringify({ username, password })
    });

    if (!res.ok) {
      errEl.classList.add('show');
      return;
    }

    const data = await res.json();
    token = data.token;
    localStorage.setItem('jwt_token', token);

    document.getElementById('login-page').style.display = 'none';
    document.getElementById('dashboard-page').style.display = 'flex';

    await loadDevices();
  } catch (e) {
    errEl.textContent = 'Connection error. Check API_BASE.';
    errEl.classList.add('show');
  }
}

// ── LOGOUT ───────────────────────────────────────────────
document.getElementById('logout-btn').addEventListener('click', () => {
  token = null;
  localStorage.removeItem('jwt_token');

  allRecords = [];
  document.getElementById('dashboard-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('password').value = '';
  document.getElementById('login-error').classList.remove('show');
});

// ── DEVICES ──────────────────────────────────────────────
async function loadDevices() {
  const res = await apiFetch('/devices');
  const devices = await res.json();

  const sel = document.getElementById('device-select');
  sel.innerHTML = '';
  devices.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.device_id;
    opt.textContent = d.device_id;
    sel.appendChild(opt);
  });

  if (devices.length > 0) {
    await loadDeviceData(devices[0].device_id);
  }

  sel.addEventListener('change', () => loadDeviceData(sel.value));
}

// ── DEVICE DATA ──────────────────────────────────────────
async function loadDeviceData(deviceId) {
  // show loading state
  document.getElementById('chart-loading').style.display = 'flex';
  document.getElementById('chart-svg').style.display = 'none';
  document.getElementById('media-grid').innerHTML = '<div class="media-empty">Loading…</div>';
  document.getElementById('device-meta').textContent = 'loading…';

  const [dataRes, avgRes] = await Promise.all([
    apiFetch(`/devices/${deviceId}/data`),
    apiFetch(`/devices/${deviceId}/hourly-average`)
  ]);

  allRecords = await dataRes.json();
  const hourlyAvg = await avgRes.json();

  // Meta: count + average hourly temp
  const avgTemp = allRecords.length > 0
    ? (allRecords.reduce((s, r) => s + r.temperature, 0) / allRecords.length).toFixed(0)
    : '—';

  document.getElementById('device-meta').innerHTML =
    `<span>${allRecords.length} records</span> | average-hourly: <span>${avgTemp}°C</span>`;
  document.getElementById('media-count').textContent = allRecords.length;

  renderChart(allRecords);
  renderMedia(allRecords, activeFilter);
}

// ── CHART ────────────────────────────────────────────────
function renderChart(records) {
  const svg = document.getElementById('chart-svg');
  const loading = document.getElementById('chart-loading');

  if (records.length === 0) {
    loading.textContent = 'No data';
    loading.style.display = 'flex';
    svg.style.display = 'none';
    return;
  }

  loading.style.display = 'none';
  svg.style.display = 'block';
  svg.innerHTML = '';

  const sorted = [...records].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

  const W = svg.parentElement.getBoundingClientRect().width || 800;
  const H = 260;
  const PAD = { top: 20, right: 20, bottom: 40, left: 48 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const temps = sorted.map(r => r.temperature);
  const times = sorted.map(r => new Date(r.timestamp).getTime());
  const minT = Math.floor(Math.min(...temps)) - 2;
  const maxT = Math.ceil(Math.max(...temps)) + 2;
  const minTime = Math.min(...times);
  const maxTime = Math.max(...times);

  const xScale = t => PAD.left + ((t - minTime) / (maxTime - minTime || 1)) * cW;
  const yScale = v => PAD.top + cH - ((v - minT) / (maxT - minT)) * cH;

  // Grid lines
  const tickCount = 5;
  for (let i = 0; i <= tickCount; i++) {
    const val = minT + ((maxT - minT) / tickCount) * i;
    const y = yScale(val);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', PAD.left);
    line.setAttribute('x2', W - PAD.right);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('stroke', '#3d3a7a'); line.setAttribute('stroke-width', '1');
    svg.appendChild(line);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', PAD.left - 8);
    label.setAttribute('y', y + 4);
    label.setAttribute('text-anchor', 'end');
    label.setAttribute('fill', '#8883bb');
    label.setAttribute('font-size', '11');
    label.setAttribute('font-family', 'DM Mono, monospace');
    label.textContent = Math.round(val);
    svg.appendChild(label);
  }

  // X axis labels — не даємо тексту злипатися
  const maxLabels = 6;
  const minLabelDistance = 90; // px
  const step = Math.max(1, Math.ceil(sorted.length / maxLabels));

  let lastLabelX = -Infinity;

  for (let i = 0; i < sorted.length; i += step) {
    const x = xScale(times[i]);

    // не малюємо біля правого краю, де GMT
    if (x > W - PAD.right - 60) continue;

    // не малюємо, якщо занадто близько до попереднього label
    if (x - lastLabelX < minLabelDistance) continue;

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', x);
    label.setAttribute('y', H - 22);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', '#8883bb');
    label.setAttribute('font-size', '10');
    label.setAttribute('font-family', 'DM Mono, monospace');
    label.textContent = formatTime(sorted[i].timestamp);
    svg.appendChild(label);

    lastLabelX = x;
  }

  const gmtLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  gmtLabel.setAttribute('x', W - PAD.right);
  gmtLabel.setAttribute('y', H - 6);
  gmtLabel.setAttribute('text-anchor', 'end');
  gmtLabel.setAttribute('fill', '#8883bb');
  gmtLabel.setAttribute('font-size', '10');
  gmtLabel.setAttribute('font-family', 'DM Mono, monospace');
  gmtLabel.textContent = 'GMT';
  svg.appendChild(gmtLabel);

  // Polyline
  const points = sorted.map((r, i) => `${xScale(times[i])},${yScale(r.temperature)}`).join(' ');
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  poly.setAttribute('points', points);
  poly.setAttribute('fill', 'none');
  poly.setAttribute('stroke', '#a78bfa');
  poly.setAttribute('stroke-width', '2');
  poly.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(poly);

  // Dots with hover
  const tooltip = document.getElementById('chart-tooltip');
  sorted.forEach((r, i) => {
    const cx = xScale(times[i]);
    const cy = yScale(r.temperature);

    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    hit.setAttribute('cx', cx); hit.setAttribute('cy', cy);
    hit.setAttribute('r', '12');
    hit.setAttribute('fill', 'transparent');
    hit.style.cursor = 'pointer';

    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    dot.setAttribute('x', cx - 6); dot.setAttribute('y', cy - 6);
    dot.setAttribute('width', '12'); dot.setAttribute('height', '12');
    dot.setAttribute('rx', '3');
    dot.setAttribute('fill', '#211e52');
    dot.setAttribute('stroke', '#6c63ff');
    dot.setAttribute('stroke-width', '2');

    svg.appendChild(dot);
    svg.appendChild(hit);

    hit.addEventListener('mouseenter', (e) => {
      showChartTooltip(r, cx, cy, W, H);
    });
    hit.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  });
}

function showChartTooltip(record, cx, cy, svgW, svgH) {
  const tooltip = document.getElementById('chart-tooltip');
  const chartCard = tooltip.parentElement;
  const svgEl = document.getElementById('chart-svg');
  const svgRect = svgEl.getBoundingClientRect();
  const cardRect = chartCard.getBoundingClientRect();

  const scaleX = svgRect.width / svgEl.viewBox.baseVal.width;
  const scaleY = svgRect.height / svgEl.viewBox.baseVal.height;

  const absX = svgRect.left + cx * scaleX;
  const absY = svgRect.top + cy * scaleY;

  let html = '';
  if (record.file_url) {
    if (record.event_type === 'image') {
      html += `<img src="${record.file_url}" alt="" onerror="this.style.display='none'"/>`;
    } else {
      html += `<video src="${record.file_url}" muted playsinline style="width:160px;height:100px;object-fit:cover;display:block;"></video>`;
    }
  }
  html += `<div class="chart-tooltip-info">
    <strong>${record.temperature}°C</strong>
    time: ${formatTime(record.timestamp)}<br/>
    date: ${formatDate(record.timestamp)}
  </div>`;

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  // Position relative to card
  let left = absX - cardRect.left + 14;
  let top = absY - cardRect.top - 130;
  if (left + 180 > cardRect.width) left = absX - cardRect.left - 174;
  if (top < 0) top = absY - cardRect.top + 14;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
}

// ── MEDIA GRID ───────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderMedia(allRecords, activeFilter);
  });
});

function renderMedia(records, filter) {
  const grid = document.getElementById('media-grid');

  const filtered = filter === 'all'
    ? records
    : records.filter(r => r.event_type === filter);

  document.getElementById('media-count').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="media-empty">No media found</div>';
    return;
  }

  const sorted = [...filtered].sort(
    (a, b) => new Date(b.timestamp) - new Date(a.timestamp)
  );

  grid.innerHTML = sorted.map((r, i) => {
    const mediaPart = r.event_type === 'image'
      ? `<img
           class="media-thumb"
           src="${r.file_url}"
           alt=""
           loading="lazy"
           onerror="this.style.display='none'"
         />`
      : `<div class="media-video-wrap">
           <video
             class="media-thumb"
             muted
             playsinline
             preload="metadata"
             style="width:100%;height:160px;object-fit:cover;"
           >
             <source src="${r.file_url}" type="video/mp4">
             Your browser does not support the video tag.
           </video>
           <div class="play-icon">▶</div>
         </div>`;

    return `<div class="media-card" data-idx="${i}" onclick="openLightbox(${records.indexOf(r)})">
      ${mediaPart}
      <div class="media-info">
        <div class="media-info-row">
          <span class="media-temp">${r.temperature}°C</span>
          <span class="media-type-badge ${r.event_type}">${r.event_type}</span>
        </div>
        <div class="media-time">${formatTime(r.timestamp)} · ${formatDate(r.timestamp)}</div>
      </div>
    </div>`;
  }).join('');
}

// ── LIGHTBOX ─────────────────────────────────────────────
function openLightbox(idx) {
  const r = allRecords[idx];
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  const vid = document.getElementById('lightbox-video');
  const meta = document.getElementById('lightbox-meta');

  img.style.display = 'none';
  vid.style.display = 'none';

  if (r.event_type === 'image') {
    img.src = r.file_url;
    img.style.display = 'block';
  } else {
    vid.src = r.file_url;
    vid.style.display = 'block';
  }

  meta.innerHTML = `<strong>${r.temperature}°C</strong> &nbsp;·&nbsp; ${formatTime(r.timestamp)}, ${formatDate(r.timestamp)} &nbsp;·&nbsp; <span style="color:var(--accent2)">${r.device_id}</span>`;

  lb.classList.add('show');
}

document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.addEventListener('keydown', e => e.key === 'Escape' && closeLightbox());

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightbox-video').pause?.();
}

// ── RESIZE chart ─────────────────────────────────────────
window.addEventListener('resize', () => {
  if (allRecords.length > 0) renderChart(allRecords);
});

window.addEventListener('DOMContentLoaded', async () => {
  if (token) {
    try {
      await showDashboardPage();
    } catch (e) {
      token = null;
      localStorage.removeItem('jwt_token');
      showLoginPage();
    }
  } else {
    showLoginPage();
  }
});
</script>
